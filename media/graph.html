<!DOCTYPE html>
<html>
<head>
    <title>Machine Graph</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
            overflow: auto;
        }

        #graph-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 200px;
        }

        #graph-container svg {
            max-width: 100%;
            height: auto;
        }

        #error-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
            margin: 2rem auto;
            max-width: 500px;
        }

        #error-container.visible {
            display: flex;
        }

        .error-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: var(--vscode-errorForeground, #f44);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            opacity: 0.8;
        }

        .error-icon::after {
            content: '!';
            color: var(--vscode-editor-background);
            font-size: 24px;
            font-weight: bold;
        }

        #error-message {
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
            color: var(--vscode-foreground);
            opacity: 0.8;
        }

        #status {
            position: fixed;
            bottom: 8px;
            right: 8px;
            font-size: 11px;
            opacity: 0.5;
            color: var(--vscode-foreground);
        }
    </style>
</head>
<body>
    <div id="graph-container"></div>
    <div id="error-container">
        <div class="error-icon"></div>
        <div id="error-message"></div>
    </div>
    <div id="status">Waiting for .machine file...</div>
    <script>
        const vscode = acquireVsCodeApi();
    </script>
    <script src="{{scriptUri}}"></script>
</body>
</html>
